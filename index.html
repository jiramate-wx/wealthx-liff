<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WealthX RMF Service</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #849eb3; font-family: 'Noto Sans Thai', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .chat-body { padding: 20px 14px; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .bw { display: flex; align-items: flex-start; gap: 8px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .av { width: 35px; height: 35px; background: #06C755; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; }
        .bubble { background: white; border-radius: 18px 18px 18px 4px; padding: 12px 16px; font-size: 15px; max-width: 80%; line-height: 1.5; color: #333; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bw.user { flex-direction: row-reverse; }
        .bubble.user { background: #95ec79; color: #000; border-radius: 18px 18px 4px 18px; }
        .q-card { background: #1a3a6b; border-radius: 18px 18px 18px 4px; overflow: hidden; max-width: 85%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .q-body { padding: 18px; color: white; font-size: 15px; font-weight: 600; }
        .q-btns { display: flex; gap: 10px; padding: 0 16px 16px; }
        .q-btn { flex: 1; padding: 12px 8px; border-radius: 25px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; }
        .q-btn.primary { background: #06C755; color: white; }
        .q-btn.secondary { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .typing { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.7); border-radius: 15px; padding: 12px 16px; width: fit-content; }
        .typing span { width: 7px; height: 7px; background: #888; border-radius: 50%; animation: bounce 1.2s infinite; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    </style>
</head>
<body>

<div class="chat-body" id="chatBody"></div>

<script>
const LIFF_ID = "2009740963-bdYhkB68"; 
const chat = document.getElementById('chatBody');

async function initLiff() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); } 
        else { startFlow(); }
    } catch (err) { alert("ระบบขัดข้อง: " + err.message); }
}

function scroll() { chat.scrollTop = chat.scrollHeight; }
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function typing() {
    const el = document.createElement('div');
    el.className = 'bw';
    el.innerHTML = `<div class="av">W</div><div class="typing"><span></span><span></span><span></span></div>`;
    chat.appendChild(el); scroll(); return el;
}

function addW(text) { 
    chat.insertAdjacentHTML('beforeend', `<div class="bw"><div class="av">W</div><div class="bubble">${text}</div></div>`); scroll(); 
}

function addUser(text) { 
    chat.insertAdjacentHTML('beforeend', `<div class="bw user"><div class="bubble user">${text}</div></div>`); scroll(); 
}

// 🎯 ฟังก์ชันเด็ด: ยิง Flex Message (JSON) เข้าแชท
async function sendFlex(title, detail) {
    const t = typing(); await wait(1000); t.remove();
    addW("รับทราบครับ ข้อมูลถูกส่งเข้าแชทให้เจ้าหน้าที่แล้วครับ...");
    await wait(1000);

    try {
        await liff.sendMessages([
            {
                "type": "flex",
                "altText": "สนใจย้าย RMF มาที่ WealthX",
                "contents": {
                    "type": "bubble",
                    "styles": { "header": { "backgroundColor": "#1a3a6b" } },
                    "header": {
                        "type": "box", "layout": "vertical",
                        "contents": [{ "type": "text", "text": "📦 รายละเอียดการย้าย RMF", "color": "#ffffff", "weight": "bold", "size": "md" }]
                    },
                    "body": {
                        "type": "box", "layout": "vertical", "spacing": "md",
                        "contents": [
                            { "type": "text", "text": title, "weight": "bold", "size": "lg", "wrap": true },
                            { "type": "text", "text": detail, "size": "sm", "color": "#666666", "wrap": true },
                            { "type": "separator", "margin": "lg" },
                            { "type": "text", "text": "เจ้าหน้าที่จะติดต่อกลับโดยเร็วที่สุด", "size": "xs", "color": "#999999", "align": "center" }
                        ]
                    }
                }
            }
        ]);
        liff.closeWindow(); // ส่งเสร็จ ปิดแอปทันที
    } catch (e) { alert("ส่ง Flex ไม่สำเร็จ: เช็คการเปิด Scope chat_message.write"); }
}

function qCard(body, btn1, btn2, onYes, onNo) {
    const id = 'q' + Date.now();
    chat.insertAdjacentHTML('beforeend', `<div class="bw"><div class="av">W</div><div class="q-card"><div class="q-body">${body}</div><div class="q-btns"><button class="q-btn primary" id="${id}y">${btn1}</button><button class="q-btn secondary" id="${id}n">${btn2}</button></div></div></div>`);
    scroll();
    document.getElementById(id + 'y').onclick = onYes;
    document.getElementById(id + 'n').onclick = onNo;
}

async function startFlow() {
    const t = typing(); await wait(1000); t.remove();
    qCard('สวัสดีครับ คุณเปิดบัญชีกองทุนกับ WealthX หรือยัง?','มีอยู่แล้ว','ยังไม่มีครับ',
        async () => {
            addUser('มีอยู่แล้ว'); const t2 = typing(); await wait(800); t2.remove();
            qCard('ต้องการสับเปลี่ยนกี่กองทุนครับ?','1 กองทุน','มากกว่า 1 กองทุน',
                async () => { addUser('1 กองทุน'); await sendFlex("ลูกค้าเดิม: สับเปลี่ยน 1 กองทุน", "ต้องการย้าย RMF มาที่ WealthX โดยเป็นลูกค้าที่มีบัญชีอยู่แล้ว"); },
                async () => { addUser('มากกว่า 1 กองทุน'); await sendFlex("ลูกค้าเดิม: สับเปลี่ยนหลายกองทุน", "ต้องการย้าย RMF มาที่ WealthX หลายรายการ"); }
            );
        },
        async () => {
            addUser('ยังไม่มีครับ');
            await sendFlex("ลูกค้าใหม่: สนใจเปิดบัญชี", "สนใจย้าย RMF แต่ยังไม่มีบัญชีกับ WealthX");
        }
    );
}

window.onload = initLiff;
</script>
</body>
</html>
